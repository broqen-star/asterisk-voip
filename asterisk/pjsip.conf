;==============================================================
; pjsip.conf  —  SIP 内線の定義
;--------------------------------------------------------------
; 登場する内線は2つだけ:
;   phone : 応答する側(スマホのLinphone / ラズパイ など)  内線番号 200
;   ht813 : 電話回線側のゲートウェイ(HT813 の FXO)
;
; ★ パスワードは必ず変更してください（2か所: password の行）。
;   ht813 のパスワードは、HT813 本体側にも同じ値を設定します。
;
; ※ 重要: endpoint / auth / aor は「同じ名前」で揃えてあります。
;   登録(REGISTER)を受け付けるには AOR 名が一致している必要があるためです。
;   （PJSIP では type 違いなら同名セクションを複数持てます）
;==============================================================

[global]
type=global

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

;==============================================================
; 応答する内線 (スマホ / ラズパイ)   内線番号: 200
;==============================================================
[phone]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
auth=phone-auth
aors=phone
; --- NAT/宅内でも音声が通りやすくする定番設定 ---
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[phone-auth]
type=auth
auth_type=userpass
username=phone
password=CHANGE-ME-phone-9x27Kd          ; ★変更する

[phone]
type=aor
max_contacts=3          ; 同じ内線にスマホ+ラズパイ+予備を同時登録して一斉に鳴らせる
qualify_frequency=30
remove_existing=no

;==============================================================
; 電話回線側ゲートウェイ (HT813 の FXO)
;==============================================================
[ht813]
type=endpoint
context=from-pstn       ; ここから来た着信=外線着信 として扱う
disallow=all
allow=ulaw
allow=alaw
auth=ht813-auth
aors=ht813
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[ht813-auth]
type=auth
auth_type=userpass
username=ht813
password=CHANGE-ME-ht813-7q41Zp          ; ★変更する（HT813本体にも同じ値を設定）

[ht813]
type=aor
max_contacts=1
qualify_frequency=30
