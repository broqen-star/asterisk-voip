;==============================================================
; extensions.conf  —  ダイヤルプラン(通話の流れ)
;--------------------------------------------------------------
; 目的:
;   1) 外線着信を スマホ/ラズパイ(内線200) に鳴らす
;   2) Linphone から HT813 経由で 既存PBX の内線/外線へ発信する
;==============================================================

[general]
static=yes
writeprotect=no

[globals]
; 鳴らす先。同じ内線 phone に複数台を登録すれば一斉に鳴る
PHONE=PJSIP/phone
RING_TIMEOUT=10                 ; 内線200を鳴らす秒数。ここを超えたら案内へ
ANNOUNCE=custom/callback-5105   ; 案内音声（拡張子 .wav は書かない）

;==============================================================
; 外線着信: HT813(FXO) → ここに入ってくる
;==============================================================
[from-pstn]
; 番号付き・番号なし(s) どちらも同じ処理へ集約
exten => _X.,1,Goto(inbound,1)
exten => s,1,Goto(inbound,1)

exten => inbound,1,NoOp(=== 外線着信 CID=${CALLERID(num)} ===)
 same => n,Dial(${PHONE},${RING_TIMEOUT})     ; 応答すればここで通話 → 終わればチャネル終了
 ; --- ここから下は「応答されなかった」場合だけ通る ---
 same => n,NoOp(=== 不応答 DIALSTATUS=${DIALSTATUS} → 案内を流す ===)
 same => n,Answer()                           ; ★アナウンス再生には応答が必須
 same => n,Wait(1)                            ; 音声が頭切れしないよう1秒待つ
 same => n,Playback(${ANNOUNCE})
 same => n,Wait(1)
 same => n,Hangup()

;==============================================================
; 内線からの発信 (Linphone → Asterisk → HT813 → PBX)
;==============================================================
[from-internal]
; --- 疎通テスト: 200 で自分(スマホ/ラズパイ)が鳴る ---
exten => 200,1,NoOp(=== 内線テスト ===)
 same => n,Dial(${PHONE},20)
 same => n,Hangup()

; --- 案内音声の再生テスト（Linphoneから 201 にダイヤル） ---
exten => 201,1,NoOp(=== 案内音声テスト ===)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(${ANNOUNCE})
 same => n,Hangup()

; --- 251: シャイニングスター ループ再生 ---
exten => 251,1,NoOp(=== 音楽ループ再生 ===)
 same => n,Answer()
 same => n,Set(LOOPCOUNT=0)
 same => n,While($[1])                    ; 無限ループ
 same => n,Playback(custom/shining_star)
 same => n,EndWhile()
 same => n,Hangup()

; --- 252: BGM ループ再生 ---
exten => 252,1,NoOp(=== 音楽ループ再生 ===)
 same => n,Answer()
 same => n,Set(LOOPCOUNT=0)
 same => n,While($[1])                    ; 無限ループ
 same => n,Playback(custom/2_23_AM)
 same => n,EndWhile()
 same => n,Hangup()

; --- 通信品質確認用: エコーテスト ---
exten => 290,1,NoOp(=== エコーテスト開始 ===)
 same => n,Answer()
 same => n,Playback(demo-echotest)      ; "You are about to be placed in an echo test" (英語)
 same => n,Echo()                       ; ここで話した声がそのまま返ってくる
 same => n,Playback(demo-echodone)      ; 終了案内
 same => n,Hangup()

; --- 既存PBXの内線へ発信 (5xxx / 8xxx の4桁) ---
;   例: 5105, 8203 など。HT813経由でPBXへ番号を送出する。
exten => _5XXX,1,NoOp(=== 内線発信 ${EXTEN} → HT813経由 ===)
 same => n,Dial(PJSIP/${EXTEN}@ht813,30)
 same => n,Hangup()

exten => _8XXX,1,NoOp(=== 内線発信 ${EXTEN} → HT813経由 ===)
 same => n,Dial(PJSIP/${EXTEN}@ht813,30)
 same => n,Hangup()

; --- 外線へ発信 (0発信) ---
;   PBXが「0発信」で外線をつかむ仕様。頭の0込みでそのままHT813へ渡す。
;   うまく繋がらない場合は 0 の後にポーズを入れる例:
;     Dial(PJSIP/0w${EXTEN:1}@ht813,60)
;   ★安全網: 万一の切れ残りに備え通話上限を付けたい場合は L(ミリ秒) を足す。
;     例) 60分で強制終了: Dial(PJSIP/${EXTEN}@ht813,60,L(3600000))
exten => _0X.,1,NoOp(=== 外線発信 ${EXTEN} → HT813経由 ===)
 same => n,Dial(PJSIP/${EXTEN}@ht813,60)
 same => n,Hangup()

; --- 通信品質確認用: エコーテスト ---
exten => 500,1,NoOp(=== エコーテスト開始 ===)
 same => n,Answer()
 same => n,Playback(demo-echotest)      ; "You are about to be placed in an echo test" (英語)
 same => n,Echo()                       ; ここで話した声がそのまま返ってくる
 same => n,Playback(demo-echodone)      ; 終了案内
 same => n,Hangup()

